name: Generate 3D City
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: uddeshsingh
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          # The '|| exit 0' prevents the action from failing if there are no new commits to make today
          git commit -m "Updated 3D Contribution City" || exit 0
          # This pulls your latest README edits before pushing the images
          git pull --rebase origin main
          git push